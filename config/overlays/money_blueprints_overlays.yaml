# =============================================================================
# money_blueprints_overlays.yaml - Finance Channel
# Supported fields: type, timing_start_s, timing_end_s, text, fontsize,
#                   fontcolor, x, y, boxcolor, boxborderw
# =============================================================================

overlays:

  # Hook: First 3 seconds - attention-grabbing opening
  - type: text
    timing_start_s: 0.0
    timing_end_s: 3.0
    text: "{{ hook_text }}"
    fontsize: 54
    fontcolor: "white"
    x: "w/2"
    y: "h/4"
    boxcolor: "0x00d4aaff"
    boxborderw: 2

  # Benefit: Core message at 8-14 seconds
  - type: text
    timing_start_s: 8.0
    timing_end_s: 14.0
    text: "{{ key_benefit }}"
    fontsize: 44
    fontcolor: "0x00d4aaff"
    x: "w/2"
    y: "h/2"
    boxcolor: "0x000000cc"
    boxborderw: 0

  # CTA: Last 4 seconds call-to-action
  - type: text
    timing_start_s: -4.0
    timing_end_s: 0
    text: "Follow @money_blueprints"
    fontsize: 40
    fontcolor: "black"
    x: "w/2"
    y: "h*0.85"
    boxcolor: "0x00d4aaff"
    boxborderw: 0
