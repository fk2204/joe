# prof8ssor_ai_overlays.yaml - AI Tutorials Channel
overlays:
  - type: text
    timing_start_s: 0.0
    timing_end_s: 3.0
    text: "{{ hook_text }}"
    fontsize: 54
    fontcolor: "0x3498dbff"
    x: "w/2"
    y: "h/4"
    boxcolor: "0x000000b3"
    boxborderw: 0

  - type: text
    timing_start_s: 8.0
    timing_end_s: 18.0
    text: "STEP 1: {{ key_benefit }}"
    fontsize: 44
    fontcolor: "white"
    x: "w/2"
    y: "h/2"
    boxcolor: "0x3498dbff"
    boxborderw: 0

  - type: text
    timing_start_s: 20.0
    timing_end_s: -5.0
    text: "RESULT: {{ key_benefit }}"
    fontsize: 44
    fontcolor: "0x3498dbff"
    x: "w/2"
    y: "h*0.7"
    boxcolor: "0x000000b3"
    boxborderw: 0

  - type: text
    timing_start_s: -5.0
    timing_end_s: 0
    text: "Follow for daily AI tools"
    fontsize: 40
    fontcolor: "white"
    x: "w/2"
    y: "h*0.85"
    boxcolor: "0x3498dbff"
    boxborderw: 0
