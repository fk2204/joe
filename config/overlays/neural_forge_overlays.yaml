# neural_forge_overlays.yaml - AI/Tech Channel
overlays:
  - type: text
    timing_start_s: 0.0
    timing_end_s: 3.0
    text: "{{ hook_text }}"
    fontsize: 54
    fontcolor: "0x00d4ffff"
    x: "w/2"
    y: "h/4"
    boxcolor: "0x000000b3"
    boxborderw: 0

  - type: text
    timing_start_s: 8.0
    timing_end_s: 14.0
    text: "{{ key_benefit }}"
    fontsize: 44
    fontcolor: "white"
    x: "w/2"
    y: "h/2"
    boxcolor: "0x000000a6"
    boxborderw: 0

  - type: text
    timing_start_s: -4.0
    timing_end_s: 0
    text: "Follow for daily AI tools"
    fontsize: 40
    fontcolor: "white"
    x: "w/2"
    y: "h*0.85"
    boxcolor: "0x00d4ffff"
    boxborderw: 0
